<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RetroGames - Web Guest</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jmuxer@2.0.5/dist/jmuxer.min.js"></script>
    <style>
        body { margin: 0; background: black; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; font-family: sans-serif; touch-action: none; }
        video { width: 100%; height: 100%; object-fit: contain; position: absolute; z-index: 1; }
        #overlay { position: absolute; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.8); width: 100%; height: 100%; }
        
        /* კონტროლერების მთავარი კონტეინერი */
        #controls { position: absolute; z-index: 5; width: 100%; height: 100%; pointer-events: none; display: none; }
        
        /* ღილაკების ჯგუფები (Draggable) */
        .control-group { position: absolute; pointer-events: auto; display: flex; justify-content: center; align-items: center; }
        .dpad-group { left: 10%; bottom: 15%; width: 150px; height: 150px; }
        .action-group { right: 10%; bottom: 15%; width: 150px; height: 150px; }
        .l-shoulder-group { left: 10%; bottom: 45%; width: 180px; height: 60px; }
        .r-shoulder-group { right: 10%; bottom: 45%; width: 180px; height: 60px; }
        
        /* ღილაკების დიზაინი */
        .btn { width: 50px; height: 50px; background: rgba(80,80,80,0.8); border: 1px solid rgba(255,255,255,0.5); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 18px; user-select: none; position: absolute; color: #E0E0E0; }
        .btn.pressed { background: rgba(120,120,120,0.9); border-color: white; }
        .btn-small { width: 40px; height: 40px; font-size: 14px; }
        
        /* D-Pad განლაგება */
        .btn.up { top: 0; left: 50px; } .btn.down { bottom: 0; left: 50px; } .btn.left { top: 50px; left: 0; } .btn.right { top: 50px; right: 0; }
        /* Action განლაგება */
        .btn.tri { top: 0; left: 50px; } .btn.cross { bottom: 0; left: 50px; } .btn.sq { top: 50px; left: 0; } .btn.circ { top: 50px; right: 0; }
        /* Shoulders & Select/Start განლაგება */
        .btn.l1 { top: -20px; left: 50px; } .btn.l2 { top: 10px; left: -10px; } .btn.sel { top: 10px; left: 110px; }
        .btn.r1 { top: -20px; left: 50px; } .btn.r2 { top: 10px; left: 110px; } .btn.srt { top: 10px; left: -10px; }

        /* პარამეტრების ღილაკი და მენიუ */
        #settingsBtn { position: absolute; top: 20px; right: 20px; z-index: 10; width: 50px; height: 50px; background: rgba(50,50,50,0.6); border-radius: 10px; display: none; justify-content: center; align-items: center; font-size: 24px; cursor: pointer; pointer-events: auto; color: white; border: 1px solid rgba(255,255,255,0.3); }
        #settingsMenu { position: absolute; top: 80px; right: 20px; z-index: 11; background: rgba(30,30,30,0.95); padding: 10px; border-radius: 10px; display: none; flex-direction: column; gap: 10px; border: 1px solid #555; }
        .menu-item { background: #1976D2; color: white; padding: 10px 15px; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; text-align: center; }
        
        /* Edit Mode Styling */
        .edit-mode .control-group { border: 2px dashed #00BCD4; background: rgba(0, 188, 212, 0.2); border-radius: 10px; cursor: move; }
        .edit-mode .btn { pointer-events: none; }
        #saveLayoutBtn { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); z-index: 12; background: #4CAF50; color: white; padding: 10px 20px; border: none; border-radius: 5px; font-size: 16px; display: none; pointer-events: auto; cursor: pointer; }
    </style>
</head>
<body>

    <video id="player" autoplay muted playsinline></video>
    
    <div id="overlay">
        <h2 id="statusText">უკავშირდება ჰოსტს...</h2>
        <button id="startBtn" style="display:none; padding: 15px 30px; font-size: 18px; background: #4CAF50; color: white; border: none; border-radius: 10px; cursor: pointer;">თამაშის დაწყება (Start)</button>
    </div>

    <div id="settingsBtn">⚙</div>
    <div id="settingsMenu">
        <button class="menu-item" id="menuFitBtn">ეკრანი: 4:3 / 16:9</button>
        <button class="menu-item" id="menuEditBtn">✏️ ღილაკების გადატანა</button>
        <button class="menu-item" id="menuHideBtn">🎮 ღილაკების დამალვა</button>
    </div>
    <button id="saveLayoutBtn">💾 დამახსოვრება</button>

    <div id="controls">
        <div class="control-group l-shoulder-group" id="group-ls">
            <div class="btn l1" data-code="10">L1</div>
            <div class="btn l2" data-code="12">L2</div>
            <div class="btn btn-small sel" data-code="2">■</div>
        </div>
        
        <div class="control-group r-shoulder-group" id="group-rs">
            <div class="btn r1" data-code="11">R1</div>
            <div class="btn btn-small srt" data-code="3">▶</div>
            <div class="btn r2" data-code="13">R2</div>
        </div>

        <div class="control-group dpad-group" id="group-dpad">
            <div class="btn up" data-axis="1" data-val="-1">▲</div>
            <div class="btn down" data-axis="1" data-val="1">▼</div>
            <div class="btn left" data-axis="0" data-val="-1">◀</div>
            <div class="btn right" data-axis="0" data-val="1">▶</div>
        </div>
        
        <div class="control-group action-group" id="group-action">
            <div class="btn tri" data-code="9">△</div>
            <div class="btn cross" data-code="0">✕</div>
            <div class="btn sq" data-code="1">□</div>
            <div class="btn circ" data-code="8">○</div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const hostId = urlParams.get('id');
        let activeConnection = null;
        let isEditMode = false;
        let controlsVisible = true;
        let isFill = false;

        // PeerJS და ვიდეოს ლოგიკა
        if (!hostId) {
            document.getElementById('statusText').innerText = "შეცდომა: Host ID ვერ მოიძებნა.";
        } else {
            const peer = new Peer({ config: { 'iceServers': [ { urls: 'stun:stun.l.google.com:19302' } ] } });
            let jmuxer = new JMuxer({ node: 'player', mode: 'video', flushingTime: 0, fps: 60, debug: false });
            let audioCtx = new (window.AudioContext || window.webkitAudioContext)({sampleRate: 44100});
            let nextAudioTime = 0;

            peer.on('open', () => {
                const conn = peer.connect(hostId, { reliable: true });
                conn.on('open', () => {
                    activeConnection = conn;
                    document.getElementById('statusText').innerText = "წარმატებით დაუკავშირდა!";
                    document.getElementById('startBtn').style.display = "block";
                });

                conn.on('data', (data) => {
                    if (data.type === 'vid_reset') {
                        jmuxer.destroy();
                        jmuxer = new JMuxer({ node: 'player', mode: 'video', flushingTime: 0, fps: 60, debug: false });
                    }
                    if (data.type === 'vid') {
                        let bytes = new Uint8Array(atob(data.data).split('').map(c => c.charCodeAt(0)));
                        jmuxer.feed({ video: bytes });
                    }
                    if (data.type === 'aud') {
                        if(audioCtx.state === 'suspended') return;
                        let bytes = new Uint8Array(atob(data.data).split('').map(c => c.charCodeAt(0)));
                        let int16 = new Int16Array(bytes.buffer);
                        let float32 = new Float32Array(int16.length);
                        for(let i=0; i<int16.length; i++) float32[i] = int16[i] / 32768.0;
                        
                        let audioBuffer = audioCtx.createBuffer(2, int16.length / 2, 44100);
                        audioBuffer.getChannelData(0).set(float32.filter((_, i) => i % 2 === 0));
                        audioBuffer.getChannelData(1).set(float32.filter((_, i) => i % 2 !== 0));
                        
                        let source = audioCtx.createBufferSource();
                        source.buffer = audioBuffer;
                        source.connect(audioCtx.destination);
                        source.start(nextAudioTime);
                        nextAudioTime += audioBuffer.duration;
                    }
                });
            });

            document.getElementById('startBtn').addEventListener('click', () => {
                document.getElementById('overlay').style.display = 'none';
                document.getElementById('controls').style.display = 'block';
                document.getElementById('settingsBtn').style.display = 'flex';
                document.getElementById('player').play();
                if(audioCtx.state === 'suspended') audioCtx.resume();
                startGamepadLoop(); // ჯოისტიკის მონიტორინგის ჩართვა
            });
        }

        // --- სიგნალების გაგზავნა (Player 2) ---
        function sendInput(type, index, isDown, val = 0.0) {
            if (activeConnection && activeConnection.open) {
                activeConnection.send({player: 2, type: type, index: index, isDown: isDown, val: val});
            }
        }

        // --- ეკრანის ღილაკების ლოგიკა (Touch/Mouse) ---
        document.querySelectorAll('.btn').forEach(btn => {
            const handleEvent = (e, isDown) => {
                if(isEditMode) return;
                e.preventDefault();
                if(isDown) btn.classList.add('pressed'); else btn.classList.remove('pressed');
                
                if (btn.hasAttribute('data-code')) {
                    sendInput('btn', parseInt(btn.getAttribute('data-code')), isDown);
                } else if (btn.hasAttribute('data-axis')) {
                    let val = isDown ? parseFloat(btn.getAttribute('data-val')) : 0;
                    sendInput('axis', parseInt(btn.getAttribute('data-axis')), false, val);
                }
            };
            btn.addEventListener('pointerdown', e => handleEvent(e, true));
            btn.addEventListener('pointerup', e => handleEvent(e, false));
            btn.addEventListener('pointerleave', e => handleEvent(e, false));
        });

        // --- პარამეტრების მენიუ ---
        const settingsBtn = document.getElementById('settingsBtn');
        const settingsMenu = document.getElementById('settingsMenu');
        const controlsDiv = document.getElementById('controls');
        const videoPlayer = document.getElementById('player');
        
        settingsBtn.addEventListener('click', () => {
            settingsMenu.style.display = settingsMenu.style.display === 'flex' ? 'none' : 'flex';
        });

        document.getElementById('menuFitBtn').addEventListener('click', () => {
            isFill = !isFill;
            videoPlayer.style.objectFit = isFill ? 'fill' : 'contain';
            settingsMenu.style.display = 'none';
        });

        document.getElementById('menuHideBtn').addEventListener('click', () => {
            controlsVisible = !controlsVisible;
            controlsDiv.style.opacity = controlsVisible ? '1' : '0';
            settingsMenu.style.display = 'none';
        });

        // --- Edit Layout (ღილაკების გადაადგილება) ---
        const saveLayoutBtn = document.getElementById('saveLayoutBtn');
        document.getElementById('menuEditBtn').addEventListener('click', () => {
            isEditMode = true;
            controlsDiv.classList.add('edit-mode');
            settingsMenu.style.display = 'none';
            saveLayoutBtn.style.display = 'block';
            controlsDiv.style.opacity = '1';
        });

        saveLayoutBtn.addEventListener('click', () => {
            isEditMode = false;
            controlsDiv.classList.remove('edit-mode');
            saveLayoutBtn.style.display = 'none';
        });

        // Drag Logic ედიტ რეჟიმისთვის
        document.querySelectorAll('.control-group').forEach(group => {
            let isDragging = false, startX, startY, initialLeft, initialTop;
            group.addEventListener('pointerdown', (e) => {
                if(!isEditMode) return;
                isDragging = true;
                startX = e.clientX; startY = e.clientY;
                const rect = group.getBoundingClientRect();
                initialLeft = rect.left; initialTop = rect.top;
                group.setPointerCapture(e.pointerId);
            });
            group.addEventListener('pointermove', (e) => {
                if(!isDragging || !isEditMode) return;
                const dx = e.clientX - startX;
                const dy = e.clientY - startY;
                group.style.left = `${initialLeft + dx}px`;
                group.style.top = `${initialTop + dy}px`;
                group.style.right = 'auto'; // ვუთიშავთ right/bottom прив'язку
                group.style.bottom = 'auto';
            });
            group.addEventListener('pointerup', () => { isDragging = false; });
        });

        // --- Gamepad API (ფიზიკური ჯოისტიკის მხარდაჭერა კომპიუტერისთვის/ტელევიზორისთვის) ---
        const gamepadState = {}; // წინა კადრის სტატუსი რომ შევადაროთ
        const GAMEPAD_MAP = {
            0: 8,  // A -> Circle (8)
            1: 0,  // B -> Cross (0)
            2: 1,  // X -> Square (1)
            3: 9,  // Y -> Triangle (9)
            4: 10, // LB -> L1 (10)
            5: 11, // RB -> R1 (11)
            6: 12, // LT -> L2 (12)
            7: 13, // RT -> R2 (13)
            8: 2,  // Select -> Select (2)
            9: 3   // Start -> Start (3)
        };

        function startGamepadLoop() {
            function updateGamepads() {
                const gamepads = navigator.getGamepads ? navigator.getGamepads() : [];
                const gp = gamepads[0]; // ვიღებთ პირველ შეერთებულ ჯოისტიკს
                
                if (gp) {
                    // ღილაკების შემოწმება
                    gp.buttons.forEach((button, index) => {
                        const isPressed = button.pressed;
                        if (gamepadState[index] !== isPressed) {
                            gamepadState[index] = isPressed;
                            
                            // სტანდარტული ღილაკები
                            if (GAMEPAD_MAP[index] !== undefined) {
                                sendInput('btn', GAMEPAD_MAP[index], isPressed);
                            }
                            
                            // D-pad ღილაკები (12=Up, 13=Down, 14=Left, 15=Right) სტანდარტულ ჯოისტიკებზე
                            if (index === 12) sendInput('axis', 1, false, isPressed ? -1 : 0);
                            if (index === 13) sendInput('axis', 1, false, isPressed ? 1 : 0);
                            if (index === 14) sendInput('axis', 0, false, isPressed ? -1 : 0);
                            if (index === 15) sendInput('axis', 0, false, isPressed ? 1 : 0);
                        }
                    });

                    // ანალოგების შემოწმება (Axis 0 და 1)
                    const xAxis = Math.abs(gp.axes[0]) > 0.2 ? gp.axes[0] : 0;
                    const yAxis = Math.abs(gp.axes[1]) > 0.2 ? gp.axes[1] : 0;
                    
                    if (gamepadState['axis0'] !== xAxis) {
                        gamepadState['axis0'] = xAxis;
                        sendInput('axis', 0, false, xAxis);
                    }
                    if (gamepadState['axis1'] !== yAxis) {
                        gamepadState['axis1'] = yAxis;
                        sendInput('axis', 1, false, yAxis);
                    }
                }
                requestAnimationFrame(updateGamepads);
            }
            requestAnimationFrame(updateGamepads);
        }
    </script>
</body>
</html>

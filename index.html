<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RetroGames - Web Player</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jmuxer@2.0.5/dist/jmuxer.min.js"></script>
    <style>
        body { margin: 0; background: black; overflow: hidden; font-family: sans-serif; color: white; touch-action: none; user-select: none; }
        #video-container { position: absolute; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; z-index: 1; }
        video { width: 100%; height: 100%; object-fit: fill; transition: all 0.3s ease; }
        
        #overlay { position: absolute; z-index: 50; background: rgba(0,0,0,0.85); width: 100vw; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        /* კონტროლერების ფენა */
        #controls { position: absolute; z-index: 10; width: 100vw; height: 100vh; pointer-events: none; }
        .control-group { position: absolute; pointer-events: auto; transform: translate(-50%, -50%); }
        
        /* ღილაკების დიზაინი (Android-ის ანალოგი 53px ზომით) */
        .btn { position: absolute; width: 53px; height: 53px; background: rgba(80,80,80,0.8); border: 1px solid rgba(255,255,255,0.5); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 20px; color: #E0E0E0; transform: translate(-50%, -50%); box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .btn:active, .btn.active { background: rgba(120,120,120,0.9); border-color: white; }
        .btn.small { font-size: 14px; }
        
        /* სეთინგების ღილაკი და მენიუ */
        #settingsBtn { position: absolute; top: 20px; right: 20px; z-index: 20; width: 50px; height: 50px; background: rgba(50,50,50,0.6); border: none; border-radius: 10px; color: white; font-size: 24px; pointer-events: auto; cursor: pointer; }
        #menu { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #222; padding: 20px; border-radius: 10px; z-index: 30; width: 300px; box-shadow: 0 0 20px rgba(0,0,0,0.8); }
        .menu-btn { width: 100%; padding: 12px; margin: 5px 0; background: #333; color: white; border: 1px solid #555; border-radius: 5px; font-size: 16px; cursor: pointer; }
        .menu-btn:active { background: #555; }
        .menu-title { text-align: center; margin-top: 0; border-bottom: 1px solid #444; padding-bottom: 10px; }
        
        /* Edit Mode */
        .drag-handle { position: absolute; width: 40px; height: 40px; background: rgba(0, 188, 212, 0.8); border-radius: 50%; transform: translate(-50%, -50%); z-index: 15; display: none; pointer-events: auto; }
        #saveLayoutBtn { display: none; position: absolute; top: 20px; left: 50%; transform: translateX(-50%); z-index: 30; background: #4CAF50; padding: 10px 20px; border: none; border-radius: 5px; color: white; font-size: 16px; pointer-events: auto; cursor: pointer; }
    </style>
</head>
<body>

    <div id="video-container">
        <video id="player" autoplay muted playsinline></video>
    </div>
    
    <div id="overlay">
        <h2 id="statusText">უკავშირდება ჰოსტს...</h2>
        <button id="startBtn" style="display:none; padding: 15px 30px; font-size: 18px; cursor: pointer; background:#1976D2; color:white; border:none; border-radius:8px;">▶ თამაშის დაწყება (სრული ეკრანი)</button>
        <p style="margin-top:20px; color:#aaa; font-size:14px;">მხარდაჭერილია კლავიატურა და PC/TV ჯოისტიკი</p>
    </div>

    <button id="settingsBtn">⚙</button>
    <button id="saveLayoutBtn">💾 დამახსოვრება</button>

    <div id="menu">
        <h3 class="menu-title">პარამეტრები</h3>
        <button class="menu-btn" onclick="toggleAspectRatio()">📺 ეკრანი: <span id="aspectText">16:9 (სრული)</span></button>
        <button class="menu-btn" onclick="cycleSplitScreen()">✂️ გაჭრა: <span id="splitText">ნორმალური</span></button>
        <button class="menu-btn" onclick="toggleEditMode()">✏️ ღილაკების გადატანა</button>
        <button class="menu-btn" onclick="toggleControlsVisibility()">🎮 სენსორების დამალვა</button>
        <button class="menu-btn" onclick="closeMenu()" style="background:#d32f2f;">❌ დახურვა</button>
    </div>

    <div id="controls">
        <div class="drag-handle" id="handle-dpad"></div>
        <div class="drag-handle" id="handle-l"></div>
        <div class="drag-handle" id="handle-r"></div>
        <div class="drag-handle" id="handle-action"></div>

        <div class="control-group" id="grp-l">
            <div class="btn small" style="top: -25px; left: 0;" data-btn="10">L1</div>
            <div class="btn small" style="top: 0; left: -60px;" data-btn="12">L2</div>
            <div class="btn small" style="top: 0; left: 60px;" data-btn="2">■</div> 
        </div>

        <div class="control-group" id="grp-r">
            <div class="btn small" style="top: -25px; left: 0;" data-btn="11">R1</div>
            <div class="btn small" style="top: 0; left: 60px;" data-btn="13">R2</div>
            <div class="btn small" style="top: 0; left: -60px;" data-btn="3">▶</div> 
        </div>

        <div class="control-group" id="grp-dpad">
            <div class="btn" style="top: -55px; left: 0;" data-axis="1,-1">▲</div>
            <div class="btn" style="top: 55px; left: 0;" data-axis="1,1">▼</div>
            <div class="btn" style="top: 0; left: -55px;" data-axis="0,-1">◀</div>
            <div class="btn" style="top: 0; left: 55px;" data-axis="0,1">▶</div>
        </div>

        <div class="control-group" id="grp-action">
            <div class="btn" style="top: -55px; left: 0;" data-btn="9">△</div>
            <div class="btn" style="top: 55px; left: 0;" data-btn="0">✕</div>
            <div class="btn" style="top: 0; left: -55px;" data-btn="1">□</div>
            <div class="btn" style="top: 0; left: 55px;" data-btn="8">○</div>
        </div>
    </div>

    <script>
        // --- Android Logic for Button Layout ---
        // ზუსტად იგივე პოზიციები, რაც შენს GamePlayerFragment.kt-ში წერია
        let dpadPos = { x: 0.13, y: 0.60 };
        let actionPos = { x: 0.92, y: 0.60 };
        let lPos = { x: 0.13, y: 0.32 };
        let rPos = { x: 0.92, y: 0.32 };

        function applyAndroidLayout() {
            let w = window.innerWidth;
            let h = window.innerHeight;
            
            // ვაფიქსირებთ, რომ სიგანე ყოველთვის სიგრძეზე მეტი იყოს (Landscape ლოგიკა)
            let screenWidth = Math.max(w, h);
            let screenHeight = Math.min(w, h);

            // უსაფრთხოების ზონა ეკრანის კიდეებიდან (მინიმუმ 90 პიქსელი)
            let safeMarginX = 90; 
            let safeMarginY = 90;

            // მარცხენა ღილაკები არასდროს მივა მარცხენა კიდესთან 90 პიქსელზე ახლოს
            let leftX = Math.max(screenWidth * lPos.x, safeMarginX);
            
            // მარჯვენა ღილაკები არასდროს მივა მარჯვენა კიდესთან 90 პიქსელზე ახლოს
            let rightX = Math.min(screenWidth * rPos.x, screenWidth - safeMarginX);

            // ზედა და ქვედა პოზიციების დაზღვევა
            let bottomY = Math.min(screenHeight * dpadPos.y, screenHeight - safeMarginY);
            let topY = Math.max(screenHeight * lPos.y, safeMarginY);

            // პოზიციების მინიჭება
            document.getElementById('grp-dpad').style.left = leftX + "px";
            document.getElementById('grp-dpad').style.top = bottomY + "px";

            document.getElementById('grp-action').style.left = rightX + "px";
            document.getElementById('grp-action').style.top = bottomY + "px";

            document.getElementById('grp-l').style.left = leftX + "px";
            document.getElementById('grp-l').style.top = topY + "px";

            document.getElementById('grp-r').style.left = rightX + "px";
            document.getElementById('grp-r').style.top = topY + "px";
        }

        // ეკრანის ზომის შეცვლისას (ან გადაბრუნებისას) ავტომატურად სწორდება ღილაკები
        window.addEventListener('resize', applyAndroidLayout);
        applyAndroidLayout();

        // --- PeerJS & Video Logic ---
        const urlParams = new URLSearchParams(window.location.search);
        const hostId = urlParams.get('id');
        let activeConnection = null;
        let isControlsVisible = true;
        let isAspectRatio4To3 = false;
        let splitMode = 'normal'; 
        let isEditMode = false;

        if (!hostId) {
            document.getElementById('statusText').innerText = "შეცდომა: ლინკში Host ID ვერ მოიძებნა.";
        } else {
            const peer = new Peer({ config: { 'iceServers': [ { urls: 'stun:stun.l.google.com:19302' } ] } });
            let jmuxer = new JMuxer({ node: 'player', mode: 'video', flushingTime: 0, fps: 60, debug: false });
            let audioCtx = new (window.AudioContext || window.webkitAudioContext)({sampleRate: 44100});
            let nextAudioTime = 0;

            peer.on('open', () => {
                const conn = peer.connect(hostId, { reliable: true });
                conn.on('open', () => {
                    activeConnection = conn;
                    document.getElementById('statusText').innerText = "წარმატებით დაუკავშირდა!";
                    document.getElementById('startBtn').style.display = "block";
                    startGamepadPolling(); 
                });

                conn.on('data', (data) => {
                    if (data.type === 'vid_reset') {
                        jmuxer.destroy();
                        jmuxer = new JMuxer({ node: 'player', mode: 'video', flushingTime: 0, fps: 60, debug: false });
                    }
                    if (data.type === 'vid') {
                        let binaryString = atob(data.data);
                        let bytes = new Uint8Array(binaryString.length);
                        for (let i = 0; i < binaryString.length; i++) bytes[i] = binaryString.charCodeAt(i);
                        jmuxer.feed({ video: bytes });
                    }
                    if (data.type === 'aud') {
                        if(audioCtx.state === 'suspended') return;
                        let binaryString = atob(data.data);
                        let bytes = new Uint8Array(binaryString.length);
                        for (let i = 0; i < binaryString.length; i++) bytes[i] = binaryString.charCodeAt(i);
                        let int16 = new Int16Array(bytes.buffer);
                        let float32 = new Float32Array(int16.length);
                        for(let i=0; i<int16.length; i++) float32[i] = int16[i] / 32768.0;
                        
                        let audioBuffer = audioCtx.createBuffer(2, int16.length / 2, 44100);
                        audioBuffer.getChannelData(0).set(float32.filter((_, i) => i % 2 === 0));
                        audioBuffer.getChannelData(1).set(float32.filter((_, i) => i % 2 !== 0));
                        
                        let source = audioCtx.createBufferSource();
                        source.buffer = audioBuffer;
                        source.connect(audioCtx.destination);
                        
                        let v = document.getElementById('player');
                        if (v && v.buffered.length > 0) {
                            let liveEdge = v.buffered.end(v.buffered.length - 1);
                            if (liveEdge - v.currentTime > 0.4) v.currentTime = liveEdge;
                        }
                        source.start(nextAudioTime);
                        nextAudioTime += audioBuffer.duration;
                    }
                });
            });

            // --- Fullscreen და ავტომატური ჰორიზონტალური რეჟიმი ---
            document.getElementById('startBtn').addEventListener('click', async () => {
                let elem = document.documentElement;
                try {
                    // სრულ ეკრანზე გადასვლა
                    if (elem.requestFullscreen) { await elem.requestFullscreen(); }
                    else if (elem.webkitRequestFullscreen) { await elem.webkitRequestFullscreen(); }

                    // ეკრანის ჰორიზონტალურად ჩაკეტვა (Landscape Lock)
                    if (screen.orientation && screen.orientation.lock) {
                        await screen.orientation.lock('landscape');
                    }
                } catch (err) {
                    console.log("Landscape lock არ არის მხარდაჭერილი ამ ბრაუზერში, ან შეცდომაა:", err);
                }

                document.getElementById('overlay').style.display = 'none';
                document.getElementById('player').play();
                if(audioCtx.state === 'suspended') audioCtx.resume();
                
                // ეკრანის გადაბრუნების შემდეგ ღილაკების პოზიციებს ხელახლა ვასწორებთ
                setTimeout(applyAndroidLayout, 500); 
            });
        }

        // --- Input Logic (Touch, Keyboard, Gamepad) ---
        function sendBtn(index, isDown) {
            if (activeConnection && activeConnection.open) activeConnection.send({player: 2, type: 'btn', index: index, isDown: isDown, val: 0.0});
        }
        function sendAxis(index, value) {
            if (activeConnection && activeConnection.open) activeConnection.send({player: 2, type: 'axis', index: index, isDown: false, val: value});
        }

        // --- Smart Touch Logic (Android 8-Way D-Pad + Buttons) ---
        const activeTouches = {};
        const controlsDiv = document.getElementById('controls');
        const dpadGrp = document.getElementById('grp-dpad');

        let currentDpadX = 0;
        let currentDpadY = 0;

        function triggerBtnEl(el, isDown) {
            if (!el || !el.dataset || !el.dataset.btn) return;
            if (isDown) el.classList.add('active');
            else el.classList.remove('active');
            sendBtn(parseInt(el.dataset.btn), isDown);
        }

        // ჯვრის ღილაკების ვიზუალურად ანთება გასრიალებისას
        function updateDpadVisuals(x, y) {
            let rightBtn = document.querySelector('[data-axis="0,1"]');
            let leftBtn = document.querySelector('[data-axis="0,-1"]');
            let downBtn = document.querySelector('[data-axis="1,1"]');
            let upBtn = document.querySelector('[data-axis="1,-1"]');
            
            if(rightBtn) rightBtn.classList.toggle('active', x === 1);
            if(leftBtn) leftBtn.classList.toggle('active', x === -1);
            if(downBtn) downBtn.classList.toggle('active', y === 1);
            if(upBtn) upBtn.classList.toggle('active', y === -1);
        }

        function processTouches(e) {
            if (isEditMode || !isControlsVisible) return;

            // ვპოულობთ ჯვრის (D-Pad) ცენტრს ეკრანზე
            let dpadRect = dpadGrp.getBoundingClientRect();
            let dpadCenterX = dpadRect.left + dpadRect.width / 2;
            let dpadCenterY = dpadRect.top + dpadRect.height / 2;
            let dpadRadius = 120; // რადიუსი, სადაც თითი ჯოისტიკად აღიქმება

            let newDpadX = 0;
            let newDpadY = 0;
            let currentTouchIds = [];

            for (let i = 0; i < e.touches.length; i++) {
                let t = e.touches[i];
                let tx = t.clientX;
                let ty = t.clientY;
                currentTouchIds.push(t.identifier);

                // 1. D-Pad-ის ლოგიკა (მანძილი ცენტრიდან)
                let distToDpad = Math.hypot(tx - dpadCenterX, ty - dpadCenterY);
                if (distToDpad < dpadRadius) {
                    let deadzone = 25; // 25px ცენტრიდან არის მკვდარი ზონა (რომ ტყუილად არ დაეჭიროს)

                    if (tx > dpadCenterX + deadzone) newDpadX = 1;      // მარჯვნივ
                    else if (tx < dpadCenterX - deadzone) newDpadX = -1;// მარცხნივ

                    if (ty > dpadCenterY + deadzone) newDpadY = 1;      // უკან (ქვემოთ)
                    else if (ty < dpadCenterY - deadzone) newDpadY = -1;// წინ (ზემოთ)
                } 
                // 2. ჩვეულებრივი ღილაკების ლოგიკა (X, O, R1, L1 და ა.შ.)
                else {
                    let target = document.elementFromPoint(tx, ty);
                    if (target && target.classList.contains('btn') && target.dataset.btn) {
                        if (activeTouches[t.identifier] !== target) {
                            if (activeTouches[t.identifier]) triggerBtnEl(activeTouches[t.identifier], false);
                            triggerBtnEl(target, true);
                            activeTouches[t.identifier] = target;
                        }
                    } else {
                        if (activeTouches[t.identifier]) {
                            triggerBtnEl(activeTouches[t.identifier], false);
                            delete activeTouches[t.identifier];
                        }
                    }
                }
            }

            // ვასუფთავებთ გაშვებულ ღილაკებს
            for (let id in activeTouches) {
                if (!currentTouchIds.includes(parseInt(id))) {
                    triggerBtnEl(activeTouches[id], false);
                    delete activeTouches[id];
                }
            }

            // ვაგზავნით D-Pad-ის განახლებულ სიგნალს (თუ შეიცვალა)
            if (newDpadX !== currentDpadX) { sendAxis(0, newDpadX); currentDpadX = newDpadX; }
            if (newDpadY !== currentDpadY) { sendAxis(1, newDpadY); currentDpadY = newDpadY; }
            
            // ვანთებთ შესაბამის ღილაკებს დიაგონალებზე
            updateDpadVisuals(currentDpadX, currentDpadY);
        }

        // ივენთების მიბმა
        controlsDiv.addEventListener('touchstart', (e) => { e.preventDefault(); processTouches(e); }, { passive: false });
        controlsDiv.addEventListener('touchmove', (e) => { e.preventDefault(); processTouches(e); }, { passive: false });
        controlsDiv.addEventListener('touchend', (e) => { e.preventDefault(); processTouches(e); }, { passive: false });
        controlsDiv.addEventListener('touchcancel', (e) => { e.preventDefault(); processTouches(e); }, { passive: false });

        const keyMap = {
            'KeyW': {type: 'axis', idx: 1, val: -1}, 'KeyS': {type: 'axis', idx: 1, val: 1},
            'KeyA': {type: 'axis', idx: 0, val: -1}, 'KeyD': {type: 'axis', idx: 0, val: 1},
            'KeyK': {type: 'btn', idx: 0}, 
            'KeyJ': {type: 'btn', idx: 1}, 
            'Space': {type: 'btn', idx: 2}, 
            'Enter': {type: 'btn', idx: 3}, 
            'KeyL': {type: 'btn', idx: 8}, 
            'KeyI': {type: 'btn', idx: 9}, 
            'KeyQ': {type: 'btn', idx: 10}, 
            'KeyE': {type: 'btn', idx: 11}, 
            'Digit1': {type: 'btn', idx: 12}, 
            'Digit3': {type: 'btn', idx: 13}  
        };

        window.addEventListener('keydown', (e) => {
            if(keyMap[e.code] && !e.repeat) {
                const map = keyMap[e.code];
                if(map.type === 'btn') sendBtn(map.idx, true);
                else sendAxis(map.idx, map.val);
            }
        });
        window.addEventListener('keyup', (e) => {
            if(keyMap[e.code]) {
                const map = keyMap[e.code];
                if(map.type === 'btn') sendBtn(map.idx, false);
                else sendAxis(map.idx, 0);
            }
        });

        let prevPadState = {};
        function startGamepadPolling() { requestAnimationFrame(pollGamepads); }
        function pollGamepads() {
            const gamepads = navigator.getGamepads ? navigator.getGamepads() : [];
            const pad = gamepads[0]; 
            if (pad && activeConnection && activeConnection.open) {
                const mapping = { 0: 0, 1: 8, 2: 1, 3: 9, 4: 10, 5: 11, 6: 12, 7: 13, 8: 2, 9: 3 };
                for (let i = 0; i <= 9; i++) {
                    let isPressed = pad.buttons[i].pressed;
                    if (prevPadState['b'+i] !== isPressed) {
                        sendBtn(mapping[i], isPressed);
                        prevPadState['b'+i] = isPressed;
                    }
                }
                let dpadX = pad.buttons[15]?.pressed ? 1 : (pad.buttons[14]?.pressed ? -1 : 0);
                if (Math.abs(pad.axes[0]) > 0.5) dpadX = pad.axes[0] > 0 ? 1 : -1;
                
                let dpadY = pad.buttons[13]?.pressed ? 1 : (pad.buttons[12]?.pressed ? -1 : 0);
                if (Math.abs(pad.axes[1]) > 0.5) dpadY = pad.axes[1] > 0 ? 1 : -1;

                if (prevPadState['ax0'] !== dpadX) { sendAxis(0, dpadX); prevPadState['ax0'] = dpadX; }
                if (prevPadState['ax1'] !== dpadY) { sendAxis(1, dpadY); prevPadState['ax1'] = dpadY; }
            }
            requestAnimationFrame(pollGamepads);
        }

        // --- UI & Settings Logic ---
        document.getElementById('settingsBtn').onclick = () => { document.getElementById('menu').style.display = 'block'; };
        function closeMenu() { document.getElementById('menu').style.display = 'none'; }

        function toggleControlsVisibility() {
            isControlsVisible = !isControlsVisible;
            document.querySelectorAll('.control-group').forEach(el => el.style.opacity = isControlsVisible ? '1' : '0');
            closeMenu();
        }

        function applyVideoStyle() {
            const video = document.getElementById('player');
            const fitMode = isAspectRatio4To3 ? 'contain' : 'fill';
            video.style.objectFit = fitMode;

            if (isAspectRatio4To3) {
                if (splitMode === 'top') {
                    video.style.clipPath = 'inset(0 0 50% 0)';
                    video.style.transform = 'translateY(25%) scaleY(1)';
                    video.style.transformOrigin = 'center center';
                } else if (splitMode === 'bottom') {
                    video.style.clipPath = 'inset(50% 0 0 0)';
                    video.style.transform = 'translateY(-25%) scaleY(1)';
                    video.style.transformOrigin = 'center center';
                } else {
                    video.style.clipPath = 'none';
                    video.style.transform = 'translateY(0) scaleY(1)';
                }
            } else {
                if (splitMode === 'top') {
                    video.style.clipPath = 'none';
                    video.style.transformOrigin = 'center top';
                    video.style.transform = 'translateY(0) scaleY(2)';
                } else if (splitMode === 'bottom') {
                    video.style.clipPath = 'none';
                    video.style.transformOrigin = 'center bottom';
                    video.style.transform = 'translateY(0) scaleY(2)';
                } else {
                    video.style.clipPath = 'none';
                    video.style.transformOrigin = 'center center';
                    video.style.transform = 'translateY(0) scaleY(1)';
                }
            }
        }

        function toggleAspectRatio() {
            isAspectRatio4To3 = !isAspectRatio4To3;
            document.getElementById('aspectText').innerText = isAspectRatio4To3 ? "4:3 (ორიგინალი)" : "16:9 (სრული)";
            applyVideoStyle();
        }

        function cycleSplitScreen() {
            if(splitMode === 'normal') splitMode = 'top';
            else if(splitMode === 'top') splitMode = 'bottom';
            else splitMode = 'normal';
            
            const txt = splitMode === 'top' ? 'ზედა (P1)' : (splitMode === 'bottom' ? 'ქვედა (P2)' : 'ნორმალური');
            document.getElementById('splitText').innerText = txt;
            applyVideoStyle();
        }

        // --- Edit Layout Logic ---
        function toggleEditMode() {
            isEditMode = true;
            closeMenu();
            document.getElementById('settingsBtn').style.display = 'none';
            document.getElementById('saveLayoutBtn').style.display = 'block';
            
            const handles = document.querySelectorAll('.drag-handle');
            const groups = {
                'handle-dpad': 'grp-dpad', 'handle-l': 'grp-l', 'handle-r': 'grp-r', 'handle-action': 'grp-action'
            };

            handles.forEach(handle => {
                handle.style.display = 'block';
                const grp = document.getElementById(groups[handle.id]);
                handle.style.left = grp.style.left;
                handle.style.top = grp.style.top;

                let isDragging = false;
                handle.onpointerdown = (e) => {
                    isDragging = true;
                    handle.setPointerCapture(e.pointerId);
                };
                handle.onpointermove = (e) => {
                    if(!isDragging) return;
                    let xPercent = (e.clientX / window.innerWidth);
                    let yPercent = (e.clientY / window.innerHeight);
                    
                    // ვანახლებთ JavaScript-ის ცვლადებს, რომ დამახსოვრებისას დარჩეს
                    if(handle.id === 'handle-dpad') dpadPos = {x: xPercent, y: yPercent};
                    if(handle.id === 'handle-action') actionPos = {x: xPercent, y: yPercent};
                    if(handle.id === 'handle-l') lPos = {x: xPercent, y: yPercent};
                    if(handle.id === 'handle-r') rPos = {x: xPercent, y: yPercent};

                    applyAndroidLayout(); // რეალურ დროში ვანახლებთ
                    
                    handle.style.left = (e.clientX) + 'px';
                    handle.style.top = (e.clientY) + 'px';
                };
                handle.onpointerup = (e) => { isDragging = false; handle.releasePointerCapture(e.pointerId); };
            });
        }

        document.getElementById('saveLayoutBtn').onclick = () => {
            isEditMode = false;
            document.querySelectorAll('.drag-handle').forEach(h => h.style.display = 'none');
            document.getElementById('saveLayoutBtn').style.display = 'none';
            document.getElementById('settingsBtn').style.display = 'block';
        };

        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>

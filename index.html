<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RetroGames - Web Player</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jmuxer@2.0.5/dist/jmuxer.min.js"></script>
    <style>
        body { margin: 0; background: black; overflow: hidden; color: white; font-family: sans-serif; touch-action: none; }
        /* ვიდეო ფლეიერის სტილები */
        #videoContainer { position: absolute; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; z-index: 1; }
        video { width: 100%; height: 100%; object-fit: fill; transition: all 0.3s ease; }
        
        /* შეტყობინებების ეკრანი */
        #overlay { position: absolute; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.9); width: 100%; height: 100%; }
        
        /* კონტროლერების ფენა */
        #controlsLayer { position: absolute; z-index: 10; width: 100%; height: 100%; pointer-events: none; }
        
        /* ღილაკების ჯგუფები (გადაადგილებადი) */
        .control-group { position: absolute; pointer-events: auto; }
        .btn { background: rgba(80, 80, 80, 0.8); border: 1px solid rgba(255,255,255,0.5); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 20px; user-select: none; color: #E0E0E0; position: absolute; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .btn:active { background: rgba(120, 120, 120, 0.9); border-color: white; transform: scale(0.95); }
        .btn-small { font-size: 14px; }
        
        /* D-Pad განლაგება */
        #dpadGroup { left: 10%; bottom: 20%; width: 150px; height: 150px; }
        #dpadGroup .btn { width: 50px; height: 50px; }
        .up { top: 0; left: 50px; } .down { bottom: 0; left: 50px; } .left { top: 50px; left: 0; } .right { top: 50px; right: 0; }
        
        /* Action ღილაკების განლაგება */
        #actionGroup { right: 10%; bottom: 20%; width: 150px; height: 150px; }
        #actionGroup .btn { width: 50px; height: 50px; }
        .tri { top: 0; left: 50px; } .cross { bottom: 0; left: 50px; } .sq { top: 50px; left: 0; } .circ { top: 50px; right: 0; }
        
        /* Shoulder ღილაკების განლაგება */
        #lGroup { left: 10%; top: 20%; width: 150px; height: 50px; }
        #lGroup .btn { width: 60px; height: 40px; border-radius: 10px; }
        .l1 { top: -50px; left: 45px; } .l2 { top: 0; left: 0; } .select { top: 0; left: 80px; border-radius: 50%; width: 40px; height: 40px;}
        
        #rGroup { right: 10%; top: 20%; width: 150px; height: 50px; }
        #rGroup .btn { width: 60px; height: 40px; border-radius: 10px; }
        .r1 { top: -50px; left: 45px; } .r2 { top: 0; right: 0; } .start { top: 0; right: 80px; border-radius: 50%; width: 40px; height: 40px;}

        /* პარამეტრები */
        #settingsBtn { position: absolute; top: 15px; right: 15px; z-index: 50; background: rgba(50,50,50,0.8); border: 1px solid white; border-radius: 10px; padding: 10px; color: white; font-size: 24px; pointer-events: auto; cursor: pointer; }
        #settingsMenu { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(30,30,30,0.95); padding: 20px; border-radius: 15px; z-index: 60; border: 1px solid #555; width: 300px; }
        .menu-btn { width: 100%; padding: 12px; margin: 5px 0; background: #333; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
        .menu-btn:active { background: #555; }
        
        /* Edit Mode ვიზუალი */
        .edit-mode .control-group { border: 2px dashed #00BCD4; background: rgba(0, 188, 212, 0.2); border-radius: 10px; }
        .edit-mode .btn { pointer-events: none; }
    </style>
</head>
<body>

    <div id="videoContainer">
        <video id="player" autoplay muted playsinline></video>
    </div>
    
    <div id="overlay">
        <h2 id="statusText">🌐 ვუკავშირდებით სერვერს...</h2>
        <button id="startBtn" style="display:none; padding: 15px 30px; font-size: 18px; cursor: pointer; border-radius: 10px; background: #4CAF50; color: white; border: none; margin-top: 20px;">▶ თამაშის დაწყება</button>
    </div>

    <div id="settingsBtn" onclick="toggleSettings()">⚙</div>
    <div id="settingsMenu">
        <h3 style="margin-top: 0; text-align: center;">პარამეტრები</h3>
        <button class="menu-btn" onclick="toggleAspectRatio()">📺 ეკრანი: <span id="aspectText">16:9 (სრული)</span></button>
        <button class="menu-btn" onclick="cycleSplitScreen()">✂️ გაჭრა: <span id="splitText">ნორმალური</span></button>
        <button class="menu-btn" onclick="toggleEditMode()">✏️ <span id="editText">ღილაკების გადატანა</span></button>
        <button class="menu-btn" onclick="toggleControls()">🎮 <span id="controlsText">სენსორების დამალვა</span></button>
        <button class="menu-btn" style="background: #d32f2f;" onclick="toggleSettings()">❌ დახურვა</button>
    </div>

    <div id="controlsLayer">
        <div id="lGroup" class="control-group">
            <div class="btn l1 btn-small" data-btn="10">L1</div>
            <div class="btn l2 btn-small" data-btn="12">L2</div>
            <div class="btn select btn-small" data-btn="2">■</div>
        </div>
        <div id="dpadGroup" class="control-group">
            <div class="btn up" data-axis="1" data-val="-1">▲</div>
            <div class="btn down" data-axis="1" data-val="1">▼</div>
            <div class="btn left" data-axis="0" data-val="-1">◀</div>
            <div class="btn right" data-axis="0" data-val="1">▶</div>
        </div>
        
        <div id="rGroup" class="control-group">
            <div class="btn r1 btn-small" data-btn="11">R1</div>
            <div class="btn r2 btn-small" data-btn="13">R2</div>
            <div class="btn start btn-small" data-btn="3">▶</div>
        </div>
        <div id="actionGroup" class="control-group">
            <div class="btn tri" data-btn="9">△</div>
            <div class="btn cross" data-btn="0">✕</div>
            <div class="btn sq" data-btn="1">□</div>
            <div class="btn circ" data-btn="8">○</div>
        </div>
    </div>

    <script>
        // === WebRTC და ვიდეო ლოგიკა ===
        const urlParams = new URLSearchParams(window.location.search);
        const hostId = urlParams.get('id');
        let activeConnection = null;
        let isEditMode = false;
        let areControlsVisible = true;
        
        // ეკრანის პარამეტრები
        let isAspect4to3 = false;
        let splitMode = 'normal'; // 'normal', 'top', 'bottom'

        if (!hostId) {
            document.getElementById('statusText').innerText = "❌ Host ID ვერ მოიძებნა.";
        } else {
            const peer = new Peer({ config: { 'iceServers': [ { urls: 'stun:stun.l.google.com:19302' } ] } });
            let jmuxer = new JMuxer({ node: 'player', mode: 'video', flushingTime: 0, fps: 60, debug: false });
            let audioCtx = new (window.AudioContext || window.webkitAudioContext)({sampleRate: 44100});
            let nextAudioTime = 0;

            peer.on('open', function() {
                const conn = peer.connect(hostId, { reliable: true });
                conn.on('open', function() {
                    activeConnection = conn;
                    document.getElementById('statusText').innerText = "✅ წარმატებით დაუკავშირდა!";
                    document.getElementById('startBtn').style.display = "block";
                });

                conn.on('data', function(data) {
                    if (data.type === 'vid_reset') {
                        jmuxer.destroy();
                        jmuxer = new JMuxer({ node: 'player', mode: 'video', flushingTime: 0, fps: 60, debug: false });
                    }
                    if (data.type === 'vid') {
                        let binaryString = atob(data.data);
                        let bytes = new Uint8Array(binaryString.length);
                        for (let i = 0; i < binaryString.length; i++) { bytes[i] = binaryString.charCodeAt(i); }
                        jmuxer.feed({ video: bytes });
                    }
                    if (data.type === 'aud') {
                        if(audioCtx.state === 'suspended') return;
                        let binaryString = atob(data.data);
                        let bytes = new Uint8Array(binaryString.length);
                        for (let i = 0; i < binaryString.length; i++) { bytes[i] = binaryString.charCodeAt(i); }
                        let int16 = new Int16Array(bytes.buffer);
                        let float32 = new Float32Array(int16.length);
                        for(let i=0; i<int16.length; i++) { float32[i] = int16[i] / 32768.0; }
                        
                        let audioBuffer = audioCtx.createBuffer(2, int16.length / 2, 44100);
                        audioBuffer.getChannelData(0).set(float32.filter((_, i) => i % 2 === 0));
                        audioBuffer.getChannelData(1).set(float32.filter((_, i) => i % 2 !== 0));
                        
                        let source = audioCtx.createBufferSource();
                        source.buffer = audioBuffer;
                        source.connect(audioCtx.destination);
                        source.start(nextAudioTime);
                        nextAudioTime += audioBuffer.duration;
                    }
                });
            });

            document.getElementById('startBtn').addEventListener('click', () => {
                document.getElementById('overlay').style.display = 'none';
                document.getElementById('player').play();
                if(audioCtx.state === 'suspended') audioCtx.resume();
            });
        }

        // === კონტროლერების ლოგიკა ===
        function sendInput(type, index, value) {
            if (activeConnection && activeConnection.open) {
                activeConnection.send({
                    player: 2, 
                    type: type, 
                    index: parseInt(index), 
                    isDown: value === true, 
                    val: typeof value === 'number' ? value : 0.0
                });
            }
        }

        document.querySelectorAll('.btn').forEach(btn => {
            btn.addEventListener('pointerdown', (e) => {
                if(isEditMode) return;
                e.preventDefault();
                btn.style.background = 'rgba(120, 120, 120, 0.9)';
                if(btn.dataset.btn) sendInput('btn', btn.dataset.btn, true);
                if(btn.dataset.axis) sendInput('axis', btn.dataset.axis, parseFloat(btn.dataset.val));
            });
            
            btn.addEventListener('pointerup', (e) => {
                if(isEditMode) return;
                e.preventDefault();
                btn.style.background = 'rgba(80, 80, 80, 0.8)';
                if(btn.dataset.btn) sendInput('btn', btn.dataset.btn, false);
                if(btn.dataset.axis) sendInput('axis', btn.dataset.axis, 0);
            });
            
            btn.addEventListener('pointerleave', (e) => {
                if(isEditMode) return;
                btn.style.background = 'rgba(80, 80, 80, 0.8)';
                if(btn.dataset.btn) sendInput('btn', btn.dataset.btn, false);
                if(btn.dataset.axis) sendInput('axis', btn.dataset.axis, 0);
            });
        });

        // === პარამეტრები და UI ===
        function toggleSettings() {
            const menu = document.getElementById('settingsMenu');
            menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
        }

        function toggleControls() {
            areControlsVisible = !areControlsVisible;
            document.getElementById('controlsLayer').style.display = areControlsVisible ? 'block' : 'none';
            document.getElementById('controlsText').innerText = areControlsVisible ? 'სენსორების დამალვა' : 'სენსორების ჩვენება';
        }

        // ეკრანის პროპორციები (Android ლოგიკის იმიტაცია)
        function updateVideoTransform() {
            const video = document.getElementById('player');
            video.style.objectFit = isAspect4to3 ? 'contain' : 'fill';

            if (isAspect4to3) {
                if (splitMode === 'top') {
                    video.style.clipPath = 'inset(0 0 50% 0)';
                    video.style.transform = 'translateY(25%) scaleY(1)';
                } else if (splitMode === 'bottom') {
                    video.style.clipPath = 'inset(50% 0 0 0)';
                    video.style.transform = 'translateY(-25%) scaleY(1)';
                } else {
                    video.style.clipPath = 'none';
                    video.style.transform = 'translateY(0) scaleY(1)';
                }
            } else {
                if (splitMode === 'top') {
                    video.style.clipPath = 'none';
                    video.style.transformOrigin = 'center top';
                    video.style.transform = 'translateY(0) scaleY(2)';
                } else if (splitMode === 'bottom') {
                    video.style.clipPath = 'none';
                    video.style.transformOrigin = 'center bottom';
                    video.style.transform = 'translateY(0) scaleY(2)';
                } else {
                    video.style.clipPath = 'none';
                    video.style.transformOrigin = 'center center';
                    video.style.transform = 'translateY(0) scaleY(1)';
                }
            }
        }

        function toggleAspectRatio() {
            isAspect4to3 = !isAspect4to3;
            document.getElementById('aspectText').innerText = isAspect4to3 ? '4:3 (ორიგინალი)' : '16:9 (სრული)';
            updateVideoTransform();
        }

        function cycleSplitScreen() {
            if(splitMode === 'normal') splitMode = 'top';
            else if(splitMode === 'top') splitMode = 'bottom';
            else splitMode = 'normal';
            
            let text = "ნორმალური";
            if(splitMode === 'top') text = "ზედა (P1)";
            if(splitMode === 'bottom') text = "ქვედა (P2)";
            
            document.getElementById('splitText').innerText = text;
            updateVideoTransform();
        }

        // === Drag & Drop ლოგიკა (Edit Mode) ===
        function toggleEditMode() {
            isEditMode = !isEditMode;
            const layer = document.getElementById('controlsLayer');
            
            if (isEditMode) {
                layer.classList.add('edit-mode');
                document.getElementById('editText').innerText = 'დამახსოვრება';
                toggleSettings(); // ვხურავთ მენიუს, რომ ღილაკების მოძრაობა დავიწყოთ
            } else {
                layer.classList.remove('edit-mode');
                document.getElementById('editText').innerText = 'ღილაკების გადატანა';
            }
        }

        let draggedEl = null;
        let startX = 0, startY = 0;
        let initialLeft = 0, initialTop = 0;

        document.querySelectorAll('.control-group').forEach(group => {
            group.addEventListener('pointerdown', (e) => {
                if(!isEditMode) return;
                draggedEl = group;
                startX = e.clientX;
                startY = e.clientY;
                initialLeft = group.offsetLeft;
                initialTop = group.offsetTop;
                group.style.right = 'auto'; // ვთიშავთ Right прив'язки-ს სუფთა მოძრაობისთვის
                group.style.bottom = 'auto';
                e.preventDefault();
            });
        });

        document.addEventListener('pointermove', (e) => {
            if(!isEditMode || !draggedEl) return;
            const dx = e.clientX - startX;
            const dy = e.clientY - startY;
            draggedEl.style.left = (initialLeft + dx) + 'px';
            draggedEl.style.top = (initialTop + dy) + 'px';
        });

        document.addEventListener('pointerup', () => {
            draggedEl = null;
        });

    </script>
</body>
</html>
